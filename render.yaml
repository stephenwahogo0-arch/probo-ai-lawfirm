services:
  - type: web
    name: probo-law-backend
    runtime: python
    repo: https://github.com/stephenwahogo0-arch/probo-ai-lawfirm
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: IBM_QUANTUM_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENT_WALLET_SEED
        sync: false
      - key: ALCHEMY_RPC_URL
        sync: false
      - key: AGENT_PRIVATE_KEY
        sync: false
      - key: WORKPROTOCOL_API_URL
        sync: false
      - key: WORKPROTOCOL_API_KEY
        sync: false
      - key: BITTENSOR_API_URL
        sync: false
      - key: BITTENSOR_API_KEY
        sync: false
      - key: BITTENSOR_WALLET_ADDRESS
        sync: false
      - key: AUTO_PAYOUT_ENABLED
        value: "false"

  - type: web
    name: probo-law-frontend
    runtime: static
    repo: https://github.com/stephenwahogo0-arch/probo-ai-lawfirm
    branch: main
    buildCommand: npm ci && npm run build
    publishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_BASE
        value: https://probo-law-backend.onrender.com
